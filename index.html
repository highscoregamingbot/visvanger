<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Visvanger</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #unity-canvas { width: 100%; height: 100%; display: block; }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-family: sans-serif; text-align: center;
    }
    #loading-bar {
      width: 200px; height: 6px; background: #333;
      border-radius: 3px; margin-top: 12px;
    }
    #loading-fill {
      width: 0%; height: 100%; background: #4CAF50;
      border-radius: 3px; transition: width 0.2s;
    }
  </style>
</head>
<body>
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <div id="loading">
    <div>Laai...</div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
  </div>
  <script src="Build/visvanger.loader.js"></script>
  <script>
    createUnityInstance(document.getElementById("unity-canvas"), {
      dataUrl:      "Build/visvanger.data",
      frameworkUrl:  "Build/visvanger.framework.js",
      codeUrl:       "Build/visvanger.wasm",
      companyName:   "Visvanger",
      productName:   "Visvanger",
      productVersion: "1.0",
    }, function (progress) {
      document.getElementById("loading-fill").style.width = (progress * 100) + "%";
    }).then(function (instance) {
      document.getElementById("loading").style.display = "none";
    }).catch(function (message) {
      alert(message);
    });
  </script>
</body>
</html>
